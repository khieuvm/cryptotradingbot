# ═══════════════════════════════════════════════════════════════════════════════
# Crypto Engine — Base Configuration
# Single source of truth for all strategy parameters and system settings
# Environment-specific overrides go in config/env/{backtest,dryrun,live}.yaml
# ═══════════════════════════════════════════════════════════════════════════════

version: 2

# ── Exchange ──────────────────────────────────────────────────────────────────
exchange:
  name: okx
  trading_mode: futures
  margin_mode: isolated

# ── Network (corporate proxy — set empty string when not on F-Soft network) ──
# proxy: "http://khieuvm:Lamsaoday2601@fsoft-proxy:8080"
proxy: ""

# ── Market ────────────────────────────────────────────────────────────────────
market:
  timeframe: 15m
  pairs:
    - ETH/USDT:USDT
    - SOL/USDT:USDT

# ── Cost Model ────────────────────────────────────────────────────────────────
costs:
  maker_fee: 0.0002
  taker_fee: 0.0005
  funding_avg: 0.0001

# ── Leverage ──────────────────────────────────────────────────────────────────
leverage:
  default: 3
  max_allowed: 5
  liquidation_buffer: 0.15

# ── Risk Management ──────────────────────────────────────────────────────────
risk:
  max_open_trades: 6
  max_portfolio_heat: 0.15
  max_correlation_exposure: 0.6
  circuit_breaker:
    max_daily_drawdown: 0.08
    max_weekly_drawdown: 0.12
    consecutive_losses_halt: 5
    cooldown_hours: 4

# ── Signal Tracker (auto-disable) ────────────────────────────────────────────
signal_tracker:
  window: 20
  disable_threshold_wr: 0.40
  disable_lookback: 10
  disable_duration_hours: 24
  severe_threshold_wr: 0.35
  severe_lookback: 20

# ── Regime Detection ─────────────────────────────────────────────────────────
regime:
  adx_trending: 25
  adx_ranging: 20
  atr_volatile_mult: 2.0
  funding_extreme_positive: 0.0008
  funding_extreme_negative: -0.0007

# ── Sessions (UTC) ───────────────────────────────────────────────────────────
sessions:
  asia: ["00:00", "08:00"]
  europe: ["08:00", "13:00"]
  us: ["13:00", "21:00"]
  dead: ["21:00", "00:00"]

# ── Funding Rate ─────────────────────────────────────────────────────────────
funding:
  settlement_times_utc: ["00:00", "08:00", "16:00"]
  extreme_positive: 0.001
  extreme_negative: -0.001

# ── Validation Requirements ──────────────────────────────────────────────────
validation:
  min_trades: 50
  min_days: 90
  walk_forward_is: 60
  walk_forward_oos: 30
  walk_forward_step: 30
  mc_permutations: 100
  mc_p_threshold: 0.05
  max_drawdown_a: 0.10
  max_drawdown_b: 0.15

# ── Trade Defaults ───────────────────────────────────────────────────────────
stake_amount: 50
max_stake_amount: 100

# ── Entry Filters ────────────────────────────────────────────────────────────
entry_filters:
  atr_spike_max: 0.04
  min_volume_ratio: 0.4
  btc_rsi_long_min: 35
  btc_rsi_short_max: 65
  funding_long_max: 0.00008
  funding_short_min: -0.00007

# ══════════════════════════════════════════════════════════════════════════════
# ACTIVE STRATEGIES
# ══════════════════════════════════════════════════════════════════════════════

active_strategies:
  - regime_adaptive
  - cb_adx_breakout
  - volume_spike_rev

# ── Per-Strategy Configuration ───────────────────────────────────────────────
strategies:
  regime_adaptive:
    grade: A
    pairs: [ETH/USDT:USDT, SOL/USDT:USDT]
    timeframe: 15m
    startup_candle_count: 220
    entry:
      adx_trend_thr: 31
      rsi_os: 25
      rsi_ob: 70
      vol_min: 1.5
      ema_fast: 18
      ema_slow: 50
      atr_spike_thr: 2.2
      entry_atr_fraction: 0.15
      cross_lookback: 5
    exit:
      sl_atr_mult: 7.0
      tp_atr_mult: 11.0
      time_cut_2h: -0.015
      time_cut_8h: -0.01
      time_cut_12h: -0.005
      time_cut_24h: 0.0
      time_cut_48h: 0.005
    stake:
      default: 1.0
    protections:
      cooldown_candles: 5
      stoploss_guard_trades: 3
      stoploss_guard_lookback: 96
      stoploss_guard_pause: 40
      max_drawdown: 0.15
      max_drawdown_lookback: 96
      max_drawdown_pause: 120
    pair_overrides:
      ETH/USDT:USDT:
        entry:
          method: market
        exit:
          sl_atr_mult: 7.0
          time_cut_8h: -0.01
        stake: 1.0
