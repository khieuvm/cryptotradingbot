      tp_atr_mult: 9.3
      time_cut_2h: -0.015
      time_cut_8h: -0.008
      time_cut_24h: 0.0
      time_cut_48h: 0.005
    stake:
      trend_long: 1.5
      trend_short: 1.2
      range_long: 0.3
      range_short: 1.2
    protections:
      cooldown_candles: 5
      stoploss_guard_trades: 3
